<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Кастомный Плейлист — Fixed</title>
    <style>
        :root {
            --accent-glow: rgba(255, 182, 193, 0.6);
            --accent-color: #FFB6C1;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111111;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #decorCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        .content {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            color: white;
            text-align: center;
            z-index: 10;
            position: relative;
            pointer-events: none;
        }

        h1, p, .spotify-wrapper {
            pointer-events: auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            user-select: none;
            letter-spacing: 1px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        p {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 24px;
            user-select: none;
        }

        .spotify-wrapper {
            border-radius: 20px;
            overflow: hidden;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 
                        0 0 30px rgba(255, 182, 193, 0.1);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }

        .spotify-wrapper:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 1), 
                        0 0 40px rgba(255, 182, 193, 0.25);
        }
    </style>
</head>
<body>

    <canvas id="decorCanvas"></canvas>

    <div class="content">
        <h1>мой плейлист</h1>
        <p>Нажми Play, чтобы услышать</p>
        
        <div class="spotify-wrapper">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/0XAD0WfmQQ6kDT8i0PkDII?utm_source=generator&si=69c791b03cdf48eb" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('decorCanvas');
        const ctx = canvas.getContext('2d');

        const CONFIG = {
            color: '#FFB6C1',
            bgStarsCount: 60,
            trailLength: 12,
            sparksOnClick: 15,
            mouseRadius: 100
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const history = [];

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        const backgroundParticles = [];
        class BgParticle {
            constructor() {
                this.reset(true);
            }
            reset(init = false) {
                this.baseX = Math.random() * canvas.width;
                this.baseY = init ? Math.random() * canvas.height : canvas.height + 10;
                this.x = this.baseX;
                this.y = this.baseY;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * 0.2 + 0.1;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.flashSpeed = Math.random() * 0.02 + 0.005;
                this.offsetX = 0;
                this.offsetY = 0;
            }
            update() {
                this.baseY -= this.speedY;

                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const distance = Math.hypot(dx, dy);

                if (distance < CONFIG.mouseRadius) {
                    const force = (CONFIG.mouseRadius - distance) / CONFIG.mouseRadius;
                    const targetOffsetX = (dx / distance) * force * 35;
                    const targetOffsetY = (dy / distance) * force * 35;

                    this.offsetX += (targetOffsetX - this.offsetX) * 0.1;
                    this.offsetY += (targetOffsetY - this.offsetY) * 0.1;
                } else {
                    this.offsetX += (0 - this.offsetX) * 0.05;
                    this.offsetY += (0 - this.offsetY) * 0.05;
                }

                this.x = this.baseX + this.offsetX;
                this.y = this.baseY + this.offsetY;

                this.alpha += this.flashSpeed;
                if (this.alpha > 0.7 || this.alpha < 0.1) {
                    this.flashSpeed = -this.flashSpeed;
                }

                if (this.baseY < -10) this.reset(false);
            }
            draw() {
                ctx.fillStyle = CONFIG.color;
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < CONFIG.bgStarsCount; i++) backgroundParticles.push(new BgParticle());

        const sparks = [];
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2.5 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1.5;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                this.opacity = 1;
                this.friction = 0.94;
            }
            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.025;
            }
            draw() {
                ctx.fillStyle = CONFIG.color;
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('click', (e) => {
            for (let i = 0; i < CONFIG.sparksOnClick; i++) {
                sparks.push(new Spark(e.clientX, e.clientY));
            }
        });

        function renderLoop() {
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            backgroundParticles.forEach(p => { p.update(); p.draw(); });

            history.push({ x: mouse.x, y: mouse.y });
            if (history.length > CONFIG.trailLength) history.shift();

            for (let i = 0; i < history.length; i++) {
                const pos = history[i];
                const ratio = i / history.length;
                const size = ratio * 4;

                ctx.fillStyle = CONFIG.color;
                ctx.globalAlpha = ratio * 0.6;

                ctx.shadowBlur = 8;
                ctx.shadowColor = CONFIG.color;

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            for (let i = sparks.length - 1; i >= 0; i--) {
                sparks[i].update();
                if (sparks[i].opacity <= 0) {
                    sparks.splice(i, 1);
                } else {
                    sparks[i].draw();
                }
            }

            requestAnimationFrame(renderLoop);
        }

        requestAnimationFrame(renderLoop);
    </script>
</body>
</html>
